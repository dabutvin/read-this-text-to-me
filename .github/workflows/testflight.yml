name: TestFlight

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ReadThisTextToMe.xcodeproj \
            -scheme ReadThisTextToMe

      - name: Set up App Store Connect API key
        env:
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ./private_keys
          echo "$API_KEY_CONTENT" > ./private_keys/AuthKey_${API_KEY_ID}.p8
          echo "API_KEY_PATH=$(pwd)/private_keys/AuthKey_${API_KEY_ID}.p8" >> $GITHUB_ENV

      - name: Set build number
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Archive (cloud-signed)
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ReadThisTextToMe.xcodeproj \
            -scheme ReadThisTextToMe \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ReadThisTextToMe.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID "$API_KEY_ISSUER" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyPath "${{ env.API_KEY_PATH }}" \
            CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }}

      - name: Inject teamID into ExportOptions
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :teamID $TEAM_ID" ExportOptions.plist

      - name: Export IPA
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ReadThisTextToMe.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID "$API_KEY_ISSUER" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyPath "${{ env.API_KEY_PATH }}"

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/ReadThisTextToMe.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_KEY_ISSUER"

      - name: Clean up API key
        if: always()
        run: rm -rf ./private_keys

      - name: Post build info
        if: success()
        run: |
          echo "### TestFlight Build Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ env.BUILD_NUMBER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
