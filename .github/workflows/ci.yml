name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ReadThisTextToMe.xcodeproj \
            -scheme ReadThisTextToMe

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project ReadThisTextToMe.xcodeproj \
            -scheme ReadThisTextToMe \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      # Tests will be added when we have test targets with actual tests
      # - name: Test
      #   run: |
      #     xcodebuild test \
      #       -project ReadThisTextToMe.xcodeproj \
      #       -scheme ReadThisTextToMe \
      #       -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
      #       | xcpretty --color
