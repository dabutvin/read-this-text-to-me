name: PR Screenshots

on:
  pull_request:
    branches: [main]

concurrency:
  group: screenshots-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Capture App Screenshots
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ReadThisTextToMe.xcodeproj \
            -scheme ReadThisTextToMe

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project ReadThisTextToMe.xcodeproj \
            -scheme ReadThisTextToMe \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log
          if grep -q "BUILD FAILED" build.log; then exit 1; fi

      - name: Capture screenshots
        run: |
          set -euo pipefail
          mkdir -p screenshots

          DEVICE="iPhone 16"

          # Boot the simulator
          xcrun simctl boot "$DEVICE" 2>/dev/null || true
          sleep 5

          # Clean status bar: 9:41, full signal, full wifi, full battery
          xcrun simctl status_bar "$DEVICE" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --wifiBars 3 \
            --cellularBars 4

          # Find and install the built app
          APP_PATH=$(find DerivedData/Build/Products/Debug-iphonesimulator -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find built .app bundle"
            exit 1
          fi
          echo "Installing: $APP_PATH"
          xcrun simctl install "$DEVICE" "$APP_PATH"

          BUNDLE_ID="com.readthistexttome.app"

          # --- Light Mode Screenshots ---
          xcrun simctl ui "$DEVICE" appearance light
          sleep 1

          xcrun simctl launch "$DEVICE" "$BUNDLE_ID"
          sleep 4

          xcrun simctl io "$DEVICE" screenshot screenshots/01_main_light.png
          echo "Captured: main screen (light)"

          xcrun simctl terminate "$DEVICE" "$BUNDLE_ID" 2>/dev/null || true
          sleep 1

          # --- Dark Mode Screenshots ---
          xcrun simctl ui "$DEVICE" appearance dark
          sleep 1

          xcrun simctl launch "$DEVICE" "$BUNDLE_ID"
          sleep 4

          xcrun simctl io "$DEVICE" screenshot screenshots/02_main_dark.png
          echo "Captured: main screen (dark)"

          xcrun simctl terminate "$DEVICE" "$BUNDLE_ID" 2>/dev/null || true

          # Clean up status bar override
          xcrun simctl status_bar "$DEVICE" clear

          echo "All screenshots captured:"
          ls -la screenshots/

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots-pr-${{ github.event.pull_request.number }}
          path: screenshots/
          retention-days: 30

      - name: Post screenshots to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'ci-screenshots';
            const screenshotsDir = 'screenshots';

            // Ensure the ci-screenshots branch exists
            async function ensureBranch() {
              try {
                await github.rest.repos.getBranch({ owner, repo, branch });
              } catch (e) {
                if (e.status === 404) {
                  const defaultBranch = await github.rest.repos.getBranch({
                    owner, repo, branch: 'main'
                  });
                  await github.rest.git.createRef({
                    owner, repo,
                    ref: `refs/heads/${branch}`,
                    sha: defaultBranch.data.commit.sha
                  });
                  core.info(`Created branch: ${branch}`);
                } else {
                  throw e;
                }
              }
            }

            async function uploadFile(filePath, targetPath) {
              const content = fs.readFileSync(filePath);
              const base64 = content.toString('base64');

              let sha;
              try {
                const existing = await github.rest.repos.getContent({
                  owner, repo, path: targetPath, ref: branch
                });
                sha = existing.data.sha;
              } catch (e) {
                if (e.status !== 404) throw e;
              }

              const params = {
                owner, repo,
                path: targetPath,
                message: `Update screenshot for PR #${prNumber}`,
                content: base64,
                branch
              };
              if (sha) params.sha = sha;

              await github.rest.repos.createOrUpdateFileContents(params);
              const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${targetPath}`;
              return rawUrl;
            }

            await ensureBranch();

            const files = fs.readdirSync(screenshotsDir)
              .filter(f => f.endsWith('.png'))
              .sort();

            const images = [];
            for (const file of files) {
              const filePath = path.join(screenshotsDir, file);
              const targetPath = `pr-${prNumber}/${file}`;
              core.info(`Uploading ${file}...`);
              const url = await uploadFile(filePath, targetPath);
              images.push({ name: file, url });
            }

            const commitSha = context.payload.pull_request.head.sha.substring(0, 7);
            const cacheBust = Date.now();

            let body = `## 📱 App Screenshots\n\n`;
            body += `> Automatically captured from commit \`${commitSha}\` on **${context.payload.pull_request.head.ref}**\n\n`;

            const lightImg = images.find(i => i.name.includes('light'));
            const darkImg = images.find(i => i.name.includes('dark'));

            if (lightImg && darkImg) {
              body += `| Light Mode | Dark Mode |\n`;
              body += `|:---:|:---:|\n`;
              body += `| <img src="${lightImg.url}?v=${cacheBust}" width="300" /> | <img src="${darkImg.url}?v=${cacheBust}" width="300" /> |\n`;
            } else {
              for (const img of images) {
                const label = img.name.replace(/^\d+_/, '').replace('.png', '').replace(/_/g, ' ');
                body += `### ${label}\n`;
                body += `<img src="${img.url}?v=${cacheBust}" width="350" />\n\n`;
              }
            }

            body += `\n<sub>📦 Full-resolution screenshots available in the <a href="${context.payload.pull_request.html_url}/checks">workflow artifacts</a>.</sub>\n`;
            body += `\n<!-- pr-screenshots-bot -->`;

            // Find existing bot comment to update, or create a new one
            const watermark = '<!-- pr-screenshots-bot -->';
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });

            const existing = comments.data.find(c => c.body && c.body.includes(watermark));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated existing comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body
              });
              core.info('Created new PR comment with screenshots');
            }
