name: App Store Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Submit to App Store
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ReadThisTextToMe.xcodeproj \
            -scheme ReadThisTextToMe

      - name: Set up App Store Connect API key
        env:
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ./private_keys
          echo "$API_KEY_CONTENT" > ./private_keys/AuthKey_${API_KEY_ID}.p8
          echo "API_KEY_PATH=$(pwd)/private_keys/AuthKey_${API_KEY_ID}.p8" >> $GITHUB_ENV

      - name: Extract version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Archive (unsigned)
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ReadThisTextToMe.xcodeproj \
            -scheme ReadThisTextToMe \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ReadThisTextToMe.xcarchive \
            MARKETING_VERSION=${{ env.VERSION }} \
            CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }} \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export & cloud-sign IPA
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ReadThisTextToMe.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID "$API_KEY_ISSUER" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyPath "${{ env.API_KEY_PATH }}"

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/ReadThisTextToMe.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_KEY_ISSUER"

      - name: Clean up API key
        if: always()
        run: rm -rf ./private_keys

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION }}"
          body: |
            ## Read This Text To Me v${{ env.VERSION }}

            Build ${{ env.BUILD_NUMBER }} submitted to App Store Connect.
          draft: false
          prerelease: false
