name: ReadThisTextToMe
options:
  bundleIdPrefix: com.readthistexttome
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.2"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "${TEAM_ID}"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: ReadThisTextToMe/Resources/Info.plist

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

targets:
  ReadThisTextToMe:
    type: application
    platform: iOS
    sources:
      - ReadThisTextToMe
    resources:
      - path: ReadThisTextToMe/Resources/Assets.xcassets
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.readthistexttome.app
        INFOPLIST_FILE: ReadThisTextToMe/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ReadThisTextToMe/Resources/ReadThisTextToMe.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: ReadThisTextToMe/Resources/Info.plist
      properties:
        CFBundleDisplayName: Read This Text To Me
        CFBundleName: ReadThisTextToMe
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: "Take a photo of text to have it read aloud"
        NSPhotoLibraryUsageDescription: "Select a photo containing text to have it read aloud"
        NSMicrophoneUsageDescription: "Required for camera access"
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  ReadThisTextToMeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ReadThisTextToMeTests
    dependencies:
      - target: ReadThisTextToMe
